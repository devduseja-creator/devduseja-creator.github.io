<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Saloni ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

#intro{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#020617,#0f172a,#1e293b);
}

.tap{
margin-top:20px;
animation:blink 1.5s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div id="intro">
<h1>3 June 🎂</h1>
<h2>A very special day...</h2>
<h2>Because today is Saloni's Birthday ❤️</h2>
<p class="tap">Tap anywhere to begin ✨</p>
</div>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const intro=document.getElementById("intro");
const music=document.getElementById("bgmusic");

intro.addEventListener("click",()=>{
music.currentTime=14;
music.play().catch(()=>{});
intro.innerHTML=`
<h1>Happy Birthday Saloni ❤️</h1>
<p>More coming soon...</p>
`;
});
</script>

</body>
</html>
